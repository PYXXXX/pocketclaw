name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        working-directory: pocketclaw
        run: flutter pub get

      - name: Check formatting
        working-directory: pocketclaw
        run: dart format --output=none --set-exit-if-changed app packages

      - name: Analyze workspace
        working-directory: pocketclaw
        run: ~/.pub-cache/bin/melos run analyze

      - name: Run package tests
        working-directory: pocketclaw
        run: ~/.pub-cache/bin/melos run test

      - name: Prepare Flutter app scaffolding
        working-directory: pocketclaw/app/pocketclaw_app
        run: flutter create . --project-name pocketclaw_app --platforms=android,ios

      - name: Build release APKs for testers
        working-directory: pocketclaw/app/pocketclaw_app
        run: flutter build apk --release --split-per-abi

      - name: Upload tester APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pocketclaw-android-release-apks
          path: |
            pocketclaw/app/pocketclaw_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            pocketclaw/app/pocketclaw_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            pocketclaw/app/pocketclaw_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error
