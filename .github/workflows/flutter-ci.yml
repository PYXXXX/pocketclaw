name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        working-directory: pocketclaw
        run: flutter pub get

      - name: Analyze workspace
        working-directory: pocketclaw
        run: ~/.pub-cache/bin/melos run analyze

      - name: Run package tests
        working-directory: pocketclaw
        run: ~/.pub-cache/bin/melos run test

      - name: Prepare Flutter app scaffolding
        working-directory: pocketclaw/app/pocketclaw_app
        run: flutter create . --project-name pocketclaw_app --platforms=android,ios

      - name: Smoke build Android APK
        working-directory: pocketclaw/app/pocketclaw_app
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketclaw-android-debug-apk
          path: pocketclaw/app/pocketclaw_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
