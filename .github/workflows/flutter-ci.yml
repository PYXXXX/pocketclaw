name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        working-directory: pocketclaw
        run: flutter pub get

      - name: Check formatting
        working-directory: pocketclaw
        run: dart format --output=none --set-exit-if-changed app packages

      - name: Analyze workspace
        working-directory: pocketclaw
        run: dart pub global run melos run analyze

      - name: Run package tests
        working-directory: pocketclaw
        run: dart pub global run melos run test

      - name: Prepare Flutter app scaffolding
        working-directory: pocketclaw/app/pocketclaw_app
        run: flutter create . --project-name pocketclaw_app --platforms=android --no-overwrite

      - name: Enable Android desugaring for notifications
        working-directory: pocketclaw/app/pocketclaw_app/android/app
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("build.gradle.kts")
          text = path.read_text()

          compile_options = (
              "    compileOptions {\n"
              "        sourceCompatibility = JavaVersion.VERSION_17\n"
              "        targetCompatibility = JavaVersion.VERSION_17\n"
              "    }\n"
          )
          compile_options_with_desugaring = (
              "    compileOptions {\n"
              "        isCoreLibraryDesugaringEnabled = true\n"
              "        sourceCompatibility = JavaVersion.VERSION_17\n"
              "        targetCompatibility = JavaVersion.VERSION_17\n"
              "    }\n"
          )
          if compile_options_with_desugaring not in text:
              if compile_options not in text:
                  raise SystemExit("compileOptions block not found in android/app/build.gradle.kts")
              text = text.replace(compile_options, compile_options_with_desugaring, 1)

          desugaring_dependency = (
              '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n'
          )
          if desugaring_dependency not in text:
              deps_marker = "\ndependencies {\n"
              flutter_marker = "\nflutter {\n"
              if deps_marker in text:
                  # Append to existing dependencies block
                  idx = text.index(deps_marker) + len(deps_marker)
                  text = text[:idx] + desugaring_dependency + text[idx:]
              elif flutter_marker in text:
                  # Create new dependencies block before flutter block
                  text = text.replace(
                      flutter_marker,
                      "\ndependencies {\n" + desugaring_dependency + "}\n" + flutter_marker,
                      1,
                  )
              else:
                  raise SystemExit("Neither dependencies nor flutter block found in android/app/build.gradle.kts")

          path.write_text(text)
          PY

      - name: Build release APKs for testers
        working-directory: pocketclaw/app/pocketclaw_app
        run: flutter build apk --release --split-per-abi

      - name: Upload tester APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pocketclaw-android-release-apks
          path: |
            pocketclaw/app/pocketclaw_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            pocketclaw/app/pocketclaw_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            pocketclaw/app/pocketclaw_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error
