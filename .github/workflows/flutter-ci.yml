name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: ~/.pub-cache/bin/melos bootstrap

      - name: Analyze workspace
        run: ~/.pub-cache/bin/melos run analyze

      - name: Run package tests
        run: ~/.pub-cache/bin/melos run test

      - name: Prepare Flutter app scaffolding
        working-directory: app/pocketclaw_app
        run: flutter create . --project-name pocketclaw_app --platforms=android,ios

      - name: Smoke build Android APK
        working-directory: app/pocketclaw_app
        run: flutter build apk --debug
