name: Release Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: ~/.pub-cache/bin/melos bootstrap

      - name: Prepare Flutter app scaffolding
        working-directory: app/pocketclaw_app
        run: flutter create . --project-name pocketclaw_app --platforms=android

      - name: Build release APK
        working-directory: app/pocketclaw_app
        run: flutter build apk --release

      - name: Determine release metadata
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            TAG="manual-${GITHUB_RUN_NUMBER}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=Manual build ${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: app/pocketclaw_app/build/app/outputs/flutter-apk/app-release.apk
