name: pocketclaw

packages:
  - app/**
  - packages/**

scripts:
  format:
    run: melos exec -- "dart format ."
    description: Format all Dart and Flutter packages.
  analyze:
    run: melos exec -- "dart analyze ."
    description: Run static analysis across the workspace.
  test:
    run: melos exec --dir-exists=test -- "dart test"
    description: Run package tests where present.
  bootstrap:ci:
    run: flutter pub get
    description: Install workspace dependencies via pub workspace resolution.
