  <text x="104" y="240" fill="white" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">PocketClaw</text>
  <text x="104" y="290" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">Connect to your OpenClaw lobster 🦞 from your phone.</text>
  <text x="104" y="338" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="24">A mobile-first, Flutter-built OpenClaw client.</text>
  <text x="104" y="374" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="24">Pure frontend. No extra backend. Compatible with today’s Gateway.</text>

  <g>
