<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PocketClaw banner</title>
  <desc id="desc">PocketClaw repository banner with mobile-first OpenClaw client branding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent" x1="820" y1="120" x2="1140" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.52" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>

  <g filter="url(#glow)" opacity="0.28">
    <circle cx="220" cy="150" r="120" fill="#2563EB"/>
    <circle cx="1020" cy="140" r="140" fill="#7C3AED"/>
    <circle cx="1080" cy="500" r="150" fill="#0891B2"/>
  </g>

  <rect x="64" y="64" width="1152" height="512" rx="30" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)"/>

  <g transform="translate(104 110)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="0" y="0" width="188" height="38" rx="19" fill="#111827" stroke="#334155"/>
    <text x="22" y="25" fill="#93C5FD" font-size="16" font-weight="700" letter-spacing="1.4">POCKETCLAW</text>
    <circle cx="164" cy="19" r="5" fill="#22C55E"/>

    <text x="0" y="132" fill="#FFFFFF" font-size="72" font-weight="800">PocketClaw</text>
    <text x="0" y="184" fill="#C7D2FE" font-size="29" font-weight="600">Connect to OpenClaw from your phone.</text>
    <text x="0" y="232" fill="#CBD5E1" font-size="24">A Flutter-built, mobile-first OpenClaw client.</text>
    <text x="0" y="268" fill="#CBD5E1" font-size="24">Pure frontend. No extra backend. Compatible with today’s Gateway.</text>

    <g transform="translate(0 324)">
      <rect x="0" y="0" width="154" height="44" rx="22" fill="#111827" stroke="#334155"/>
      <text x="24" y="28" fill="#E2E8F0" font-size="18" font-weight="700">Flutter</text>

      <rect x="170" y="0" width="208" height="44" rx="22" fill="#111827" stroke="#334155"/>
      <text x="194" y="28" fill="#E2E8F0" font-size="18" font-weight="700">OpenClaw Gateway</text>

      <rect x="394" y="0" width="184" height="44" rx="22" fill="#111827" stroke="#334155"/>
      <text x="418" y="28" fill="#E2E8F0" font-size="18" font-weight="700">Pure Frontend</text>
    </g>
  </g>

  <g transform="translate(826 122)">
    <rect x="0" y="0" width="298" height="396" rx="36" fill="#0F172A" stroke="url(#accent)" stroke-width="2"/>
    <rect x="20" y="20" width="258" height="356" rx="28" fill="#020617"/>
    <rect x="96" y="10" width="106" height="8" rx="4" fill="#334155"/>

    <rect x="38" y="46" width="108" height="28" rx="14" fill="#111827" stroke="#334155"/>
    <circle cx="60" cy="60" r="5" fill="#22C55E"/>
    <text x="74" y="66" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">CONNECTED</text>

    <rect x="38" y="98" width="166" height="58" rx="18" fill="#1E293B"/>
    <rect x="52" y="115" width="84" height="8" rx="4" fill="#94A3B8"/>
    <rect x="52" y="131" width="120" height="8" rx="4" fill="#475569"/>

    <rect x="108" y="176" width="152" height="78" rx="20" fill="#1D4ED8" fill-opacity="0.18" stroke="#60A5FA"/>
    <rect x="124" y="198" width="92" height="10" rx="5" fill="#E0E7FF"/>
    <rect x="124" y="217" width="116" height="10" rx="5" fill="#BFDBFE"/>

    <rect x="38" y="278" width="222" height="72" rx="18" fill="#111827" stroke="#334155"/>
    <rect x="54" y="300" width="96" height="10" rx="5" fill="#94A3B8"/>
    <rect x="54" y="319" width="152" height="10" rx="5" fill="#475569"/>
  </g>
</svg>
