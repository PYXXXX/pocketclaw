    <rect x="286" y="420" width="206" height="44" rx="22" fill="#111827" stroke="#334155"/>
    <text x="312" y="448" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">OpenClaw Gateway</text>

    <rect x="506" y="420" width="188" height="44" rx="22" fill="#111827" stroke="#334155"/>
    <text x="532" y="448" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Pure Frontend</text>
  </g>

  <g>
    <rect x="844" y="136" width="268" height="360" rx="32" fill="#0F172A" stroke="url(#accent)" stroke-width="2"/>
    <rect x="865" y="168" width="226" height="26" rx="13" fill="#111827"/>
    <circle cx="889" cy="181" r="6" fill="#22C55E"/>
    <rect x="906" y="176" width="102" height="10" rx="5" fill="#334155"/>

    <rect x="865" y="220" width="154" height="56" rx="18" fill="#1E293B"/>
